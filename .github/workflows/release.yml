name: Windows release

on:
  push:
    tags:
      - "v*"

permissions:
  actions: read
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
      - name: Test wrapper
        working-directory: codex-trace-wrapper
        run: go test ./...
      - name: Check viewer syntax
        run: |
          node --check .\codex-trace-viewer\server.js
          node --check .\codex-trace-viewer\public\app.js
      - name: Test review storage
        shell: powershell
        run: .\codex-trace.ps1 test-storage
      - name: Check SignPath configuration
        shell: powershell
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          SIGNPATH_ORGANIZATION_ID: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          SIGNPATH_PROJECT_SLUG: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          SIGNPATH_SIGNING_POLICY_SLUG: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          SIGNPATH_ARTIFACT_CONFIGURATION_SLUG: ${{ vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
        run: |
          $required = @(
            "SIGNPATH_API_TOKEN",
            "SIGNPATH_ORGANIZATION_ID",
            "SIGNPATH_PROJECT_SLUG",
            "SIGNPATH_SIGNING_POLICY_SLUG",
            "SIGNPATH_ARTIFACT_CONFIGURATION_SLUG"
          )
          $missing = @($required | Where-Object {
            [string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($_))
          })
          if ($missing.Count -gt 0) {
            throw "Missing required SignPath repository settings: $($missing -join ', ')"
          }
      - name: Build unsigned wrapper
        shell: powershell
        run: .\codex-trace-wrapper\scripts\build-release.ps1
      - name: Upload unsigned wrapper for signing
        id: upload-unsigned-wrapper
        uses: actions/upload-artifact@v4
        with:
          name: CodexTrace-unsigned-wrapper-${{ github.ref_name }}
          path: codex-trace-wrapper/dist/codex-trace-wrapper.exe
          if-no-files-found: error
          retention-days: 1
      - name: Submit SignPath signing request
        uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned-wrapper.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed-wrapper
      - name: Install and verify signed wrapper
        shell: powershell
        run: |
          .\scripts\install-signed-wrapper.ps1 `
            -SignedArtifactDirectory .\signed-wrapper `
            -DestinationPath .\codex-trace-wrapper\dist\codex-trace-wrapper.exe
      - name: Build signed release package
        shell: powershell
        run: .\scripts\build-release-package.ps1 -SkipBuild
      - name: Verify packaged Authenticode signature
        shell: powershell
        run: .\scripts\verify-authenticode.ps1 -Path .\dist\CodexTrace\bin\codex-trace-wrapper.exe -RequireTimestamp
      - name: Create checksum
        shell: powershell
        run: |
          $hash = (Get-FileHash .\dist\CodexTrace.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  CodexTrace.zip" | Set-Content .\dist\CodexTrace.zip.sha256 -Encoding ascii
      - name: Create SBOM
        shell: powershell
        run: .\scripts\generate-sbom.ps1 -PackagePath .\dist\CodexTrace.zip -OutputPath .\dist\CodexTrace.cdx.json -Version $env:GITHUB_REF_NAME
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/CodexTrace.zip
      - uses: actions/upload-artifact@v4
        with:
          name: CodexTrace-windows-${{ github.ref_name }}
          path: |
            dist/CodexTrace.zip
            dist/CodexTrace.zip.sha256
            dist/CodexTrace.cdx.json
      - name: Publish GitHub release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create $env:GITHUB_REF_NAME `
            .\dist\CodexTrace.zip `
            .\dist\CodexTrace.zip.sha256 `
            .\dist\CodexTrace.cdx.json `
            --verify-tag `
            --generate-notes `
            --title $env:GITHUB_REF_NAME
