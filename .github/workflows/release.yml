name: Windows release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v* tag to publish
        required: true
        type: string

permissions:
  actions: read
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: codex-trace-viewer/package-lock.json
      - name: Test wrapper
        working-directory: codex-trace-wrapper
        run: go test ./...
      - name: Install viewer dependencies
        working-directory: codex-trace-viewer
        run: npm ci --omit=dev --ignore-scripts
      - name: Test viewer
        working-directory: codex-trace-viewer
        run: npm test
      - name: Check viewer syntax
        run: |
          node --check .\codex-trace-viewer\server.js
          node --check .\codex-trace-viewer\public\app.js
      - name: Test review storage
        shell: powershell
        run: .\codex-trace.ps1 test-storage
      - name: Build unsigned wrapper
        shell: powershell
        run: .\codex-trace-wrapper\scripts\build-release.ps1
      - name: Build release package
        shell: powershell
        run: .\scripts\build-release-package.ps1 -SkipBuild
      - name: Verify packaged runtime
        shell: powershell
        run: |
          $viewer = Resolve-Path .\dist\CodexTrace\codex-trace-viewer
          Push-Location $viewer
          try {
            node --input-type=module -e "import('./text-encoding.js').then(m => { if (typeof m.diagnoseTextEncoding !== 'function') process.exit(1) })"
          } finally {
            Pop-Location
          }
          $signature = Get-AuthenticodeSignature .\dist\CodexTrace\bin\codex-trace-wrapper.exe
          if ($signature.Status -ne "NotSigned") {
            throw "Unsigned release workflow expected NotSigned, found $($signature.Status)."
          }
      - name: Create checksum
        shell: powershell
        run: |
          $hash = (Get-FileHash .\dist\CodexTrace.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  CodexTrace.zip" | Set-Content .\dist\CodexTrace.zip.sha256 -Encoding ascii
      - name: Create SBOM
        shell: powershell
        run: .\scripts\generate-sbom.ps1 -PackagePath .\dist\CodexTrace.zip -OutputPath .\dist\CodexTrace.cdx.json -Version $env:RELEASE_TAG
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/CodexTrace.zip
      - uses: actions/upload-artifact@v4
        with:
          name: CodexTrace-windows-${{ env.RELEASE_TAG }}
          path: |
            dist/CodexTrace.zip
            dist/CodexTrace.zip.sha256
            dist/CodexTrace.cdx.json
      - name: Publish GitHub release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create $env:RELEASE_TAG `
            .\dist\CodexTrace.zip `
            .\dist\CodexTrace.zip.sha256 `
            .\dist\CodexTrace.cdx.json `
            --verify-tag `
            --generate-notes `
            --notes "This Windows release is not Authenticode-signed. Verify CodexTrace.zip with the published SHA-256 checksum and GitHub build provenance before installing. Windows or organization security policy may warn or block the wrapper executable." `
            --title $env:RELEASE_TAG
